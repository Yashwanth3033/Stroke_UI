{% extends 'base.html' %}
{% load static %}

{% block content %}

    <main class="h-screen flex">
{#        gradient section #}
        <section class="basis-1/2 flex flex-col justify-center items-center">
            <div class="space-y-8">
                <h1>Brain Stroke Detection</h1>
                <div class="flex flex-col gap-y-6 p-3">
                    <h4>Login</h4>
                    <form action="" class="space-y-2" method="post">
                        {% csrf_token %}
                        {{ form.as_div }}

                        <button class="w-full px-4 py-2 rounded transition-all bg-rose-500 hover:bg-rose-600 font-semibold text-lg cursor-pointer" type="submit">Login</button>
                    </form>
                    <a href="" class="text-blue-500 underline hover:text-blue-600 hover:decoration-blue-600">Forgot Password?</a>
                    <a href="" class="self-center text-blue-500 underline hover:text-blue-600 hover:decoration-blue-600">Register Here</a>
                </div>
            </div>
        </section>
        <section class="basis-1/2">
            <img src="{% static 'images/abstract-gradient-neon-lights.jpg' %}" alt="" class="object-cover size-full">
        </section>
    </main>

{% endblock %}
