{% extends 'base.html' %}

{% block title %}Dashboard{% endblock %}

{% block content %}
    <main class="max-w-screen-xl mx-auto p-12 space-y-2">
        <h1 class="font-semibold text-xl">Dashboard</h1>
        <a href="{% url 'predict' %}" class="px-4 py-2 rounded bg-blue-500">Go To App</a>
        <form action= "{% url 'logout' %}" method="POST">
            {% csrf_token %}
            <button class="px-4 py-2 mt-5 rounded bg-blue-500" type="submit"> Log out </button>
        </form>
    </main>
{% endblock %}
